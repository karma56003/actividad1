{% extends 'base.html' %} {% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h1>Ventas</h1>
  <a class="btn btn-primary" href="/venta/nueva">Registrar Venta</a>
</div>
<table class="table table-striped">
  <thead>
    <tr>
      <th>ID</th>
      <th>Producto</th>
      <th>Cantidad</th>
      <th>Total</th>
      <th>Fecha</th>
    </tr>
  </thead>
  <tbody>
    {% for v in ventas %}
    <tr>
      <td>{{ v.id }}</td>
      <td>{{ v.producto_nombre or '—' }}</td>
      <td>{{ v.cantidad }}</td>
      <td>{{ '%.2f'|format(v.total) }}</td>
      <td>{{ v.fecha }}</td>
    </tr>
    {% else %}
    <tr>
      <td colspan="5">No hay ventas registradas.</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
